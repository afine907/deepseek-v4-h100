# 模型配置
# 参考: docs/original-requirements.md

model:
  name: "deepseek-v4-flash"

  # 张量并行
  tensor_parallel_size: 8  # 8×H100 NVLink 全互联

  # 量化精度
  quantization: "FP8"     # 8位浮点，精度/显存平衡

  # 显存
  gpu_memory_utilization: 0.90
  max_seq_len: 32768      # DeepSeek-V4-Flash max_seq_len（待确认）

  # MoE 配置
  moe:
    expert_load_balancing: true  # vLLM MoE 默认开启（需确认）
