# Model / inference engine configuration
#
# WSL2 (CPU mode) — uncomment to use:
model:
  backend: vllm_cpu
  name: Qwen/Qwen3.5-0.8B
  tensor_parallel_size: 1
  dtype: bfloat16
  max_model_len: 512
  max_num_seqs: 4
  gpu_memory_utilization: 0.50
  kv_cache_memory_bytes: 268435456

