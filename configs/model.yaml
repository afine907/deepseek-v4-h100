# ============================================================
# WSL2 (CPU 开发模式) — 默认配置
# 使用 Qwen3.5-0.8B，验证本地调度逻辑
# ============================================================
model:
  backend: vllm_cpu
  name: Qwen/Qwen3.5-0.8B
  tensor_parallel_size: 1
  dtype: bfloat16
  max_model_len: 512
  max_num_seqs: 4
  gpu_memory_utilization: 0.50
  kv_cache_memory_bytes: 268435456

# ============================================================
# H100 (GPU 生产模式) — 取消下面注释切换
# 使用 DeepSeek-V4-Flash，8×NVLink
# ============================================================
# model:
#   backend: vllm
#   name: deepseek-ai/DeepSeek-V4-Flash
#   tensor_parallel_size: 8
